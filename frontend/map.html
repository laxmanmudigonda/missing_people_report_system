<!DOCTYPE html>
<html lang="en">
<head>
    <title>Map - Seekr</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        .layout { display: flex; height: calc(100vh - 52px); }
        .sidebar { width: 280px; flex-shrink: 0; background: #111827; color: white; display: flex; flex-direction: column; overflow: hidden; }
        .sidebar-body { flex: 1; overflow-y: auto; }
        #map { flex: 1; }
    </style>
</head>
<body class="text-gray-900">

<!-- Navbar -->
<nav class="bg-white px-8 py-3 flex items-center justify-between border-b z-50 relative" style="height:52px">
    <div class="flex items-center gap-2">
        <div class="w-5 h-5 bg-red-600 rounded-full"></div>
        <span class="text-lg font-black tracking-tight">Seekr</span>
    </div>
    <div class="flex items-center gap-7 text-xs font-semibold tracking-widest uppercase">
        <a href="index.html" class="text-gray-500 hover:text-red-600 transition-colors">Home</a>
        <a href="report.html" class="text-gray-500 hover:text-red-600 transition-colors">Report Case</a>
        <a href="map.html" class="text-red-600 border-b-2 border-red-600 pb-1">Map</a>
        <a href="cases.html" class="text-gray-500 hover:text-red-600 transition-colors">Sightings</a>
    </div>
    <div class="flex items-center gap-3">
        <div class="flex items-center gap-2 border rounded-full px-3 py-1.5 text-xs text-gray-400 w-36">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <span>Search cases...</span>
        </div>
        <button class="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center text-sm">🔔</button>
    </div>
</nav>

<!-- Main Layout -->
<div class="layout">

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="px-4 py-4 border-b border-gray-700">
            <div class="text-xs text-gray-400 font-bold uppercase tracking-widest">Active Cases</div>
            <div class="text-xs text-gray-500 mt-1" id="sidebarCount">Loading...</div>
        </div>

        <div class="sidebar-body p-2" id="caseList"></div>

        <div class="p-3 border-t border-gray-700">
            <a href="report.html" class="flex items-center justify-center gap-2 w-full bg-red-600 hover:bg-red-700 text-white text-xs font-black py-3 rounded tracking-wider uppercase transition-colors">
                🚨 Report New Case
            </a>
        </div>
    </div>

    <!-- Map -->
    <div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="js/config.js"></script>
<script src="js/map.js"></script>
</body>
</html>
